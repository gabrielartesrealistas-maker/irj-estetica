<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRJ Estética Auto</title>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white;text-align:center;}
header{padding:20px;}
.logo{width:120px;border-radius:10px;}
.btn{background:#00ff99;color:black;padding:10px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;margin:5px;}

form{max-width:520px;margin:auto;background:#1c1c1c;padding:15px;border-radius:10px;}
input,select{width:100%;padding:10px;margin:5px 0;border:none;border-radius:5px;}

#lista div{display:flex;justify-content:space-between;font-size:13px;margin:5px 0;}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
<h1>IRJ Estética Auto</h1>
<a class="btn" href="https://wa.me/5537984185396" target="_blank">WhatsApp</a>
</header>

<h2>Agendamento</h2>

<form>

<input id="nome" placeholder="Nome">

<input id="placa" placeholder="Placa">

<!-- MARCA -->
<select id="marca" onchange="carregarModelos()">
<option value="">Selecione a Marca</option>
<option value="Volkswagen">Volkswagen</option>
<option value="Fiat">Fiat</option>
<option value="Chevrolet">Chevrolet</option>
<option value="Toyota">Toyota</option>
<option value="Honda">Honda</option>
<option value="Ford">Ford</option>
</select>

<!-- MODELO -->
<select id="modelo">
<option value="">Selecione o Modelo</option>
</select>

<!-- COR -->
<select id="cor">
<option value="">Cor do veículo</option>
<option>Preto</option>
<option>Branco</option>
<option>Prata</option>
<option>Vermelho</option>
<option>Azul</option>
<option>Cinza</option>
<option>Verde</option>
</select>

<input id="ano" placeholder="Ano (opcional)">

<select id="porte">
<option>Pequeno</option>
<option>Médio</option>
<option>Grande</option>
</select>

<input type="date" id="data">
<input type="time" id="hora">

<h3>Serviços</h3>

<select id="servico">
<option value="300">Cristalização pintura</option>
<option value="1100">Polimento técnico</option>
<option value="950">Vitrificação pintura</option>
<option value="350">Higienização interna</option>
<option value="150">Lavagem técnica</option>
<option value="80">Lavagem simples</option>
<option value="50">Enceramento</option>
</select>

<button type="button" class="btn" onclick="add()">Adicionar</button>

<div id="lista"></div>

<h3>Total: R$ <span id="total">0</span></h3>

<button type="button" class="btn" onclick="revisar()">Revisar</button>

</form>

<div id="resumo" style="display:none;max-width:520px;margin:auto;background:#111;padding:15px;border-radius:10px;text-align:left;"></div>

<button class="btn" onclick="whats()">WhatsApp</button>
<button class="btn" onclick="pdf()">Baixar PDF</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

let dados={servicos:[],total:0};

const modelos = {
"Volkswagen":["Gol","Polo","Saveiro","T-Cross"],
"Fiat":["Uno","Argo","Toro","Cronos"],
"Chevrolet":["Onix","Prisma","S10","Cruze"],
"Toyota":["Corolla","Hilux","Etios"],
"Honda":["Civic","Fit","HR-V"],
"Ford":["Ka","Fiesta","Ranger"]
};

function carregarModelos(){
let marca=document.getElementById("marca").value;
let modelo=document.getElementById("modelo");

modelo.innerHTML="<option>Selecione o Modelo</option>";

if(modelos[marca]){
modelos[marca].forEach(m=>{
modelo.innerHTML+=`<option>${m}</option>`;
});
}
}

function add(){
let s=document.getElementById("servico");
let nome=s.options[s.selectedIndex].text;
let valor=parseFloat(s.value);

dados.servicos.push({nome,valor});
update();
}

function update(){
let html="";
dados.total=0;

dados.servicos.forEach((s,i)=>{
html+=`<div>${s.nome} - R$ ${s.valor} <button onclick="remover(${i})">❌</button></div>`;
dados.total+=s.valor;
});

document.getElementById("lista").innerHTML=html;
document.getElementById("total").innerText=dados.total;
}

function remover(i){
dados.servicos.splice(i,1);
update();
}

function revisar(){

dados.nome=nome.value;
dados.placa=placa.value;
dados.marca=marca.value;
dados.modelo=modelo.value;
dados.cor=cor.value;
dados.ano=ano.value || "Não informado";
dados.porte=porte.value;
dados.data=data.value;
dados.hora=hora.value;

resumo.style.display="block";

resumo.innerHTML=`
<h3>Resumo</h3>
Nome: ${dados.nome}<br>
Veículo: ${dados.marca} ${dados.modelo}<br>
Cor: ${dados.cor}<br>
Ano: ${dados.ano}<br>
Porte: ${dados.porte}<br><br>
Serviços:<br>
${dados.servicos.map(s=>"• "+s.nome).join("<br>")}<br><br>
TOTAL: R$ ${dados.total}<br>
Data: ${dados.data} ${dados.hora}
`;
}

function whats(){

let msg=`IRJ Estética Auto

Nome: ${dados.nome}
Veículo: ${dados.marca} ${dados.modelo}
Cor: ${dados.cor}
Ano: ${dados.ano}

Serviços:
${dados.servicos.map(s=>"• "+s.nome).join("\n")}

TOTAL: R$ ${dados.total}
Data: ${dados.data} ${dados.hora}`;

window.open("https://wa.me/5537984185396?text="+encodeURIComponent(msg));
}

function pdf(){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let logo=new Image();
logo.src="logo.png";

logo.onload=function(){

doc.addImage(logo,"PNG",70,10,60,30);

doc.setFontSize(14);
doc.text("IRJ Estética Auto",20,50);
doc.text("NOTA DE AGENDAMENTO",20,60);

doc.text("Nome: "+dados.nome,20,75);
doc.text("Veículo: "+dados.marca+" "+dados.modelo,20,85);
doc.text("Cor: "+dados.cor,20,95);
doc.text("Ano: "+dados.ano,20,105);

let y=120;
doc.text("Serviços:",20,y);
y+=10;

dados.servicos.forEach(s=>{
doc.text("- "+s.nome+" R$ "+s.valor,25,y);
y+=10;
});

doc.text("TOTAL: R$ "+dados.total,20,y+10);
doc.text("Data: "+dados.data+" "+dados.hora,20,y+20);

doc.save("IRJ-nota.pdf");

};

}

</script>

</body>
</html>
