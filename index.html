<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRJ Estética Automotiva</title>

<style>

body {
    background: linear-gradient(135deg, #000000, #0f172a);
    color: #e5e7eb;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    padding: 20px;
    text-align: center;
}

/* LOGO */
.logo {
    width: 130px;
    margin-bottom: 10px;
    filter: drop-shadow(0 0 15px rgba(59,130,246,0.7));
}

/* TÍTULO */
h1 {
    font-size: 50px;
    margin-bottom: 5px;
    background: linear-gradient(90deg, #3b82f6, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    color: #94a3b8;
    margin-bottom: 40px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
    max-width: 1100px;
    margin: 0 auto 60px;
}

/* CARDS */
.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 25px;
    padding: 25px;
    text-align: left;
    border: 1px solid rgba(255,255,255,0.08);
    transition: 0.4s;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-10px);
    border-color: #3b82f6;
    box-shadow: 0 0 25px rgba(59,130,246,0.3);
}

.price-row {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
}

.price-tag {
    color: #3b82f6;
    font-weight: bold;
}

/* FORM */
.form-box {
    max-width: 650px;
    margin: 0 auto;
    background: rgba(255,255,255,0.05);
    padding: 35px;
    border-radius: 30px;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 12px;
    border: 1px solid #1f2937;
    background: #020617;
    color: #fff;
}

/* LISTA */
.services-list {
    max-height: 200px;
    overflow-y: auto;
    background: #020617;
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 15px;
}

/* RESUMO */
#resumo {
    background: rgba(0,0,0,0.4);
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
}

/* BOTÃO */
button {
    width: 100%;
    padding: 18px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(90deg, #3b82f6, #06b6d4);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.03);
    box-shadow: 0 0 20px rgba(59,130,246,0.6);
}

</style>
</head>

<body>

<!-- LOGO -->
<img src="logo.png" class="logo">

<h1>IRJ ESTÉTICA</h1>
<p class="subtitle">🔥 Estética Automotiva Premium</p>

<h2>Serviços</h2>

<div class="grid">

<div class="card" onclick="selecionarServico('Cristalização de pintura')">
<h3>✨ Cristalização</h3>
<p>⏱ 18h</p>
<div class="price-row"><span>R$ 300+</span></div>
</div>

<div class="card" onclick="selecionarServico('Polimento técnico')">
<h3>🚗 Polimento Técnico</h3>
<p>⏱ 3 dias</p>
<div class="price-row"><span>R$ 800+</span></div>
</div>

<div class="card" onclick="selecionarServico('Vitrificação de pintura')">
<h3>💎 Vitrificação</h3>
<p>⏱ 1 dia</p>
<div class="price-row"><span>R$ 850+</span></div>
</div>

<div class="card" onclick="selecionarServico('Lavagem simples')">
<h3>🚿 Lavagem</h3>
<p>⏱ 4h</p>
<div class="price-row"><span>R$ 80+</span></div>
</div>

</div>

<div class="form-box">

<h2>Agendar</h2>

<input id="nome" placeholder="Seu nome">
<input id="veiculo" placeholder="Veículo">
<input id="placa" placeholder="Placa">

<select id="porte">
<option disabled selected>Porte do veículo</option>
<option>Pequeno</option>
<option>Médio</option>
<option>Grande</option>
</select>

<div class="services-list" id="lista_servicos">
<label><input type="checkbox" value="Cristalização de pintura"> Cristalização</label><br>
<label><input type="checkbox" value="Polimento técnico"> Polimento técnico</label><br>
<label><input type="checkbox" value="Vitrificação de pintura"> Vitrificação</label><br>
<label><input type="checkbox" value="Lavagem simples"> Lavagem simples</label>
</div>

<div id="resumo"></div>

<input id="data" type="date">
<input id="hora" type="time">

<button onclick="agendar()">🚀 Agendar via WhatsApp</button>

</div>

<script>

const precos = {
    "Cristalização de pintura": { pequeno: 300, medio: 450, grande: 650 },
    "Polimento técnico": { pequeno: 800, medio: 1100, grande: 1500 },
    "Vitrificação de pintura": { pequeno: 850, medio: 950, grande: 1100 },
    "Lavagem simples": { pequeno: 80, medio: 100, grande: 130 }
};

function selecionarServico(servico) {
    document.querySelectorAll('#lista_servicos input').forEach(cb => {
        if (cb.value === servico) cb.checked = true;
    });
    atualizarResumo();
}

function atualizarResumo() {
    const porte = document.getElementById('porte').value;
    const selecionados = document.querySelectorAll('#lista_servicos input:checked');

    if (!porte || selecionados.length === 0) {
        document.getElementById('resumo').innerHTML = "";
        return;
    }

    let total = 0;
    let html = "";

    selecionados.forEach(s => {
        const preco = precos[s.value][porte.toLowerCase()];
        total += preco;
        html += `<p>${s.value} - R$ ${preco}</p>`;
    });

    document.getElementById('resumo').innerHTML = html + `<strong>Total: R$ ${total}</strong>`;
}

document.querySelectorAll('#lista_servicos input').forEach(cb => {
    cb.addEventListener('change', atualizarResumo);
});

document.getElementById('porte').addEventListener('change', atualizarResumo);

function agendar() {
    const nome = document.getElementById('nome').value;
    const veiculo = document.getElementById('veiculo').value;
    const placa = document.getElementById('placa').value;
    const porte = document.getElementById('porte').value;
    const data = document.getElementById('data').value;
    const hora = document.getElementById('hora').value;

    const selecionados = document.querySelectorAll('#lista_servicos input:checked');

    if (!nome || !veiculo || !placa || !porte || selecionados.length === 0 || !data || !hora) {
        alert("Preencha todos os campos!");
        return;
    }

    let lista = "";
    let total = 0;

    selecionados.forEach(s => {
        const preco = precos[s.value][porte.toLowerCase()];
        total += preco;
        lista += `• ${s.value} - R$ ${preco}\n`;
    });

    const msg = `🚗 *IRJ ESTÉTICA AUTOMOTIVA*

👤 Cliente: ${nome}
🚘 Veículo: ${veiculo}
🔢 Placa: ${placa}
📏 Porte: ${porte}

🛠 Serviços:
${lista}

💰 Total: R$ ${total}

📅 Data: ${data}
⏰ Hora: ${hora}`;

    window.open("https://wa.me/5537984185396?text=" + encodeURIComponent(msg), "_blank");
}

</script>

</body>
</html>
