<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRJ Estética Auto</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root {
    --primary:#00ff99;
    --bg:#0f0f0f;
    --card:#1c1c1c;
    --input:#2b2b2b;
    --text:#fff;
}

body {
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:var(--text);
    padding:10px;
}

.container{
    max-width:600px;
    margin:auto;
    background:var(--card);
    padding:20px;
    border-radius:15px;
}

h1{color:var(--primary);text-align:center}

.logo{
    width:90px;
    display:block;
    margin:auto;
    border-radius:50%;
}

input,select{
    width:100%;
    padding:12px;
    margin:6px 0;
    border-radius:10px;
    border:none;
    background:var(--input);
    color:#fff;
}

.row{display:flex;gap:10px}

.servicos{
    display:grid;
    grid-template-columns:1fr;
    gap:6px;
}

.servicos label{
    background:#222;
    padding:10px;
    border-radius:10px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    margin-top:10px;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

.btn1{background:#444;color:#fff}
.btn2{background:#25D366;color:#fff}
.btn3{background:var(--primary);color:#000}

#modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,.9);
}

#modalContent{
    background:#fff;
    color:#000;
    width:90%;
    max-width:450px;
    margin:10% auto;
    padding:20px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">
<h1>IRJ Estética Auto</h1>

<input id="nome" placeholder="Nome">

<div class="row">
<input id="marca" placeholder="Marca">
<input id="carro" placeholder="Modelo">
</div>

<div class="row">
<input id="placa" placeholder="Placa">
<input id="cor" placeholder="Cor">
</div>

<div class="row">
<input type="date" id="data">
<input type="time" id="hora">
</div>

<select id="pagamento">
<option>Pix</option>
<option>Cartão</option>
<option>Dinheiro</option>
</select>

<select id="porte">
<option value="pequeno">Pequeno</option>
<option value="medio">Médio</option>
<option value="grande">Grande</option>
</select>

<h3>Serviços</h3>

<div class="servicos" id="servicos">
<label><input type="checkbox" value="Polimento técnico"> Polimento técnico</label>
<label><input type="checkbox" value="Cristalização de pintura"> Cristalização</label>
<label><input type="checkbox" value="Vitrificação de pintura"> Vitrificação</label>
<label><input type="checkbox" value="Higienização"> Higienização</label>
<label><input type="checkbox" value="Lavagem técnica"> Lavagem técnica</label>
<label><input type="checkbox" value="Enceramento especial"> Enceramento especial</label>
</div>

<button class="btn1" onclick="revisar()">Revisão</button>
<button class="btn2" onclick="whats()">WhatsApp</button>
<button class="btn3" onclick="pdf()">PDF</button>

</div>

<div id="modal">
<div id="modalContent">
<h3>Resumo</h3>
<div id="resumo"></div>
<button onclick="fechar()">Fechar</button>
</div>
</div>

<script>

const precos={
"Polimento técnico":{pequeno:800,medio:1100,grande:1500},
"Cristalização de pintura":{pequeno:300,medio:450,grande:650},
"Vitrificação de pintura":{pequeno:850,medio:950,grande:1100},
"Higienização":{pequeno:350,medio:450,grande:550},
"Lavagem técnica":{pequeno:150,medio:190,grande:290},
"Enceramento especial":{pequeno:50,medio:50,grande:50}
};

function dados(){
return{
nome:nome.value,
marca:marca.value,
carro:carro.value,
placa:placa.value,
cor:cor.value,
data:data.value,
hora:hora.value,
pagamento:pagamento.value,
porte:porte.value,
itens:[...servicos.querySelectorAll("input:checked")]
};
}

function revisar(){
let d=dados();
let total=0,txt="";

d.itens.forEach(i=>{
let p=precos[i.value][d.porte];
total+=p;
txt+=`<p>${i.value} - R$ ${p}</p>`;
});

resumo.innerHTML=`
<b>${d.nome}</b><br>
${d.marca} ${d.carro}<br>
Placa: ${d.placa}<br><br>
${txt}<br>
<b>Total: R$ ${total}</b>
`;

modal.style.display="block";
}

function fechar(){
modal.style.display="none";
}

function whats(){
let d=dados();
let total=0,msg="";

d.itens.forEach(i=>{
let p=precos[i.value][d.porte];
total+=p;
msg+=`✔ ${i.value} R$ ${p}%0A`;
});

let texto=
`https://wa.me/5537984185396?text=`+
`Cliente: ${d.nome}%0A`+
`Veículo: ${d.marca} ${d.carro}%0A`+
`Placa: ${d.placa}%0A`+
`Data: ${d.data} ${d.hora}%0A%0A`+
msg+
`%0ATotal: R$ ${total}`;

window.open(texto,"_blank");
}

function pdf(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();
let d=dados();
let y=20,total=0;

doc.text("IRJ ESTÉTICA AUTO",10,y);y+=10;

d.itens.forEach(i=>{
let p=precos[i.value][d.porte];
total+=p;
doc.text(i.value+" - R$ "+p,10,y);
y+=10;
});

doc.text("TOTAL: R$ "+total,10,y+10);
doc.save("orcamento.pdf");
}

</script>

</body>
</html>
