<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IRJ Estética Auto</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00c853">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family:Arial;
background:#111;
color:#fff;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
background:#1c1c1c;
padding:20px;
border-radius:10px;
}

input,select,button{
padding:10px;
margin:5px 0;
width:100%;
border-radius:8px;
border:none;
font-size:14px;
}

button{
background:#00c853;
color:#fff;
cursor:pointer;
font-weight:bold;
}

#installBtn{
background:#1976d2;
display:none;
}

h1{color:#00e676}

.item{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #333;
padding:8px 0;
}

.removeBtn{
background:#ff1744;
width:auto;
padding:6px 10px;
font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<h1>IRJ Estética Auto</h1>

<button id="installBtn">📲 Instalar Aplicativo</button>

<img src="logo.png" style="width:120px;margin:10px 0">

<input id="nome" placeholder="Nome do cliente">

<select id="servico">
<option>Cristalização de pintura</option>
<option>Polimento técnico</option>
<option>Vitrificação</option>
<option>Lavagem simples</option>
<option>Enceramento</option>
</select>

<button onclick="add()">Adicionar serviço</button>

<div id="lista"></div>

<h3>Total: R$ <span id="total">0</span></h3>

<button onclick="revisar()">Revisão</button>
<button onclick="whatsapp()">WhatsApp</button>
<button onclick="pdf()">PDF</button>

<div id="review" style="display:none;background:#222;padding:10px;margin-top:10px"></div>

</div>

<script>

// ================= PWA =================
let deferredPrompt;
const installBtn = document.getElementById("installBtn");

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = "block";
});

installBtn.addEventListener("click", async () => {
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBtn.style.display = "none";
});

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

// ================= SISTEMA =================

let carrinho = [];

const precos = {
"Cristalização de pintura": 300,
"Polimento técnico": 800,
"Vitrificação": 900,
"Lavagem simples": 80,
"Enceramento": 50
};

function add(){
let s = document.getElementById("servico").value;

carrinho.push({
nome:s,
preco:precos[s]
});

render();
}

function remover(i){
carrinho.splice(i,1);
render();
}

function render(){
let html="";
let total=0;

carrinho.forEach((i,idx)=>{
total += i.preco;

html += `
<div class="item">
<div>${i.nome} - R$ ${i.preco}</div>
<button class="removeBtn" onclick="remover(${idx})">X</button>
</div>`;
});

document.getElementById("lista").innerHTML = html;
document.getElementById("total").innerText = total;
}

function resumo(){
let nome = document.getElementById("nome").value;

let txt = "IRJ ESTÉTICA AUTO\n";
txt += "Cliente: " + nome + "\n\n";

carrinho.forEach(i=>{
txt += i.nome + " - R$ " + i.preco + "\n";
});

txt += "\nTotal: R$ " + document.getElementById("total").innerText;

return txt;
}

function whatsapp(){
window.open("https://wa.me/5537984185396?text=" + encodeURIComponent(resumo()));
}

function pdf(){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();
doc.text(resumo(),10,10);
doc.save("agendamento.pdf");
}

function revisar(){
document.getElementById("review").style.display="block";
document.getElementById("review").innerText=resumo();
}

</script>

</body>
</html>
