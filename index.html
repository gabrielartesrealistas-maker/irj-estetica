<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRJ Estética Auto</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

header{
    text-align:center;
    padding:20px;
    background:#111827;
}

.logo{
    width:120px;
    filter: drop-shadow(0 0 10px #38bdf8);
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

input, select, button{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:none;
    font-size:16px;
}

.services{
    background:#1f2937;
    padding:15px;
    border-radius:10px;
}

.services label{
    display:block;
    margin:6px 0;
}

button{
    background:#38bdf8;
    font-weight:bold;
    cursor:pointer;
}

#resumo{
    background:#111827;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
<h1>IRJ ESTÉTICA AUTO</h1>
</header>

<div class="container">

<input type="text" id="nome" placeholder="Seu nome">
<input type="text" id="carro" placeholder="Carro / Modelo">

<select id="porte">
<option value="">Selecione o porte</option>
<option value="pequeno">Pequeno</option>
<option value="medio">Médio</option>
<option value="grande">Grande</option>
</select>

<h3>Serviços</h3>

<div class="services">

<label><input type="checkbox" value="Cristalização de pintura"> Cristalização de pintura</label>
<label><input type="checkbox" value="Polimento técnico"> Polimento técnico</label>
<label><input type="checkbox" value="Vitrificação de pintura"> Vitrificação de pintura</label>
<label><input type="checkbox" value="Higienização"> Higienização</label>
<label><input type="checkbox" value="Vitrificação de faróis"> Vitrificação de faróis</label>
<label><input type="checkbox" value="Polimento comercial"> Polimento comercial</label>
<label><input type="checkbox" value="Lavagem técnica"> Lavagem técnica</label>
<label><input type="checkbox" value="Lavagem simples"> Lavagem simples</label>
<label><input type="checkbox" value="Lavagem banco de tecido"> Lavagem banco de tecido</label>
<label><input type="checkbox" value="Ducha simples"> Ducha simples</label>
<label><input type="checkbox" value="Lavagem com cera"> Lavagem com cera</label>
<label><input type="checkbox" value="Aspiração"> Aspiração</label>
<label><input type="checkbox" value="Lavagem motor e chassi"> Lavagem motor e chassi</label>
<label><input type="checkbox" value="Higienização de bancos de couro"> Higienização de bancos de couro</label>
<label><input type="checkbox" value="Limpeza e hidratação de couro"> Limpeza e hidratação de couro</label>
<label><input type="checkbox" value="Cristalização de vidros"> Cristalização de vidros</label>
<label><input type="checkbox" value="Descontaminação de vidros"> Descontaminação de vidros</label>
<label><input type="checkbox" value="Descontaminação de pintura"> Descontaminação de pintura</label>
<label><input type="checkbox" value="Enceramento especial"> Enceramento especial</label>

</div>

<button onclick="resumo()">Ver Resumo</button>
<button onclick="agendar()">Agendar no WhatsApp</button>

<div id="resumo"></div>

</div>

<script>

const precos = {
"Cristalização de pintura": { pequeno:300, medio:450, grande:650 },
"Polimento técnico": { pequeno:800, medio:1100, grande:1500 },
"Vitrificação de pintura": { pequeno:850, medio:950, grande:1100 },
"Higienização": { pequeno:350, medio:450, grande:550 },
"Vitrificação de faróis": { pequeno:200, medio:230, grande:270 },
"Polimento comercial": { pequeno:380, medio:480, grande:580 },
"Lavagem técnica": { pequeno:150, medio:190, grande:290 },
"Lavagem simples": { pequeno:80, medio:100, grande:130 },
"Lavagem banco de tecido": { pequeno:250, medio:300, grande:350 },
"Ducha simples": { pequeno:40, medio:50, grande:60 },
"Lavagem com cera": { pequeno:100, medio:130, grande:160 },
"Aspiração": { pequeno:40, medio:50, grande:60 },
"Lavagem motor e chassi": { pequeno:150, medio:200, grande:300 },
"Higienização de bancos de couro": { pequeno:240, medio:290, grande:370 },
"Limpeza e hidratação de couro": { pequeno:150, medio:160, grande:170 },
"Cristalização de vidros": { pequeno:40, medio:65, grande:85 },
"Descontaminação de vidros": { pequeno:140, medio:170, grande:240 },
"Descontaminação de pintura": { pequeno:110, medio:140, grande:190 },
"Enceramento especial": { pequeno:50, medio:50, grande:50 }
};

const tempos = {
"Cristalização de pintura":"18 horas",
"Polimento técnico":"3 dias",
"Vitrificação de pintura":"1 dia",
"Higienização":"8 horas",
"Vitrificação de faróis":"3 horas",
"Polimento comercial":"12 horas",
"Lavagem técnica":"8 horas",
"Lavagem simples":"4 horas",
"Lavagem banco de tecido":"8 horas",
"Ducha simples":"40 minutos",
"Lavagem com cera":"4 horas",
"Aspiração":"1 hora",
"Lavagem motor e chassi":"6 horas",
"Higienização de bancos de couro":"7 horas",
"Limpeza e hidratação de couro":"4 horas",
"Cristalização de vidros":"1 hora",
"Descontaminação de vidros":"4 horas",
"Descontaminação de pintura":"5 horas",
"Enceramento especial":"1 hora"
};

function resumo(){

let porte = document.getElementById("porte").value;
let itens = document.querySelectorAll("input[type=checkbox]:checked");

let html = "";
let total = 0;

itens.forEach(i => {

let nome = i.value;
let preco = precos[nome][porte];

total += preco;

html += `✔ ${nome} - R$ ${preco} - ${tempos[nome]}<br>`;
});

document.getElementById("resumo").innerHTML =
html + "<br><b>Total: R$ " + total + "</b>";
}

function agendar(){

let nome = document.getElementById("nome").value;
let carro = document.getElementById("carro").value;
let porte = document.getElementById("porte").value;

let itens = document.querySelectorAll("input[type=checkbox]:checked");

let total = 0;
let msg = `Olá, meu nome é ${nome}%0AMeu carro: ${carro}%0APorte: ${porte}%0A%0AServiços:%0A`;

itens.forEach(i => {

let nomeS = i.value;
let preco = precos[nomeS][porte];

total += preco;

msg += `- ${nomeS} (R$ ${preco}) - ${tempos[nomeS]}%0A`;
});

msg += `%0ATotal: R$ ${total}`;

// 🔴 COLOQUE SEU NÚMERO AQUI
window.open("https://wa.me/55SEUNUMEROAQUI?text=" + msg);
}
