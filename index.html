<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRJ Estética Auto</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0f0f0f;
    color:white;
    text-align:center;
}

.logo{
    width:120px;
    margin-top:15px;
    border-radius:10px;
    box-shadow:0 0 10px #00ff99;
}

header{
    padding:15px;
}

.btn{
    background:#00ff99;
    color:black;
    padding:10px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    width:100%;
    margin-top:5px;
}

.btn:hover{ background:#00cc77; }

.container{
    max-width:600px;
    margin:auto;
    padding:10px;
}

select,input{
    width:100%;
    padding:8px;
    margin:5px 0;
    border-radius:5px;
    border:none;
}

.services-list{
    text-align:left;
    background:#1c1c1c;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.item{
    display:flex;
    justify-content:space-between;
    padding:5px;
    border-bottom:1px solid #333;
}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
<h2>IRJ Estética Auto</h2>
<p>Agendamento profissional</p>

<a class="btn" target="_blank"
href="https://wa.me/5537984185396">
WhatsApp
</a>
</header>

<div class="container">

<h3>Cliente</h3>
<input id="nome" placeholder="Nome">

<input list="marcas" id="marca" placeholder="Marca">
<datalist id="marcas">
<option>Chevrolet</option><option>Volkswagen</option><option>Ford</option>
<option>Fiat</option><option>Toyota</option><option>Honda</option>
<option>Nissan</option><option>BMW</option><option>Mercedes-Benz</option>
<option>Audi</option><option>Jeep</option><option>Hyundai</option>
</datalist>

<input list="modelos" id="modelo" placeholder="Modelo (opcional)">
<datalist id="modelos">
<option>Onix</option><option>Gol</option><option>Civic</option>
<option>Corolla</option><option>HB20</option><option>Argo</option>
<option>Compass</option><option>Renegade</option>
</datalist>

<select id="cor">
<option>Cor do veículo</option>
<option>Preto</option><option>Branco</option><option>Prata</option>
<option>Cinza</option><option>Vermelho</option><option>Azul</option>
<option>Verde</option><option>Amarelo</option><option>Bege</option>
</select>

<h3>Serviços</h3>

<select id="servico">
<option value="Cristalização de pintura - 300">Cristalização de pintura</option>
<option value="Polimento técnico - 800">Polimento técnico</option>
<option value="Vitrificação de pintura - 850">Vitrificação de pintura</option>
<option value="Higienização - 350">Higienização</option>
<option value="Vitrificação de faróis - 200">Vitrificação de faróis</option>
<option value="Polimento comercial - 380">Polimento comercial</option>
<option value="Lavagem técnica - 150">Lavagem técnica</option>
<option value="Lavagem simples - 80">Lavagem simples</option>
<option value="Lavagem banco tecido - 250">Lavagem banco tecido</option>
<option value="Ducha simples - 40">Ducha simples</option>
<option value="Lavagem com cera - 100">Lavagem com cera</option>
<option value="Aspiração - 40">Aspiração</option>
<option value="Lavagem motor/chassi - 150">Lavagem motor/chassi</option>
<option value="Higienização couro - 240">Higienização couro</option>
<option value="Limpeza couro - 150">Limpeza couro</option>
<option value="Cristalização vidros - 40">Cristalização vidros</option>
<option value="Descontaminação vidros - 140">Descontaminação vidros</option>
<option value="Descontaminação pintura - 110">Descontaminação pintura</option>
<option value="Enceramento especial - 50">Enceramento especial</option>
</select>

<button class="btn" onclick="addServico()">Adicionar serviço</button>

<div class="services-list" id="lista"></div>

<h3>Total</h3>
<p id="total">R$ 0</p>

<button class="btn" onclick="gerarPDF()">Gerar PDF</button>
<button class="btn" onclick="enviarWhats()">Enviar WhatsApp</button>

</div>

<script>
let carrinho = [];

function addServico(){
    let s = document.getElementById("servico").value;
    let nome = s.split(" - ")[0];
    let preco = parseFloat(s.split(" - ")[1]);

    carrinho.push({nome, preco});
    render();
}

function render(){
    let html = "";
    let total = 0;

    carrinho.forEach((item,i)=>{
        total += item.preco;
        html += `
        <div class="item">
            ${item.nome} - R$ ${item.preco}
            <button onclick="remover(${i})">X</button>
        </div>`;
    });

    document.getElementById("lista").innerHTML = html;
    document.getElementById("total").innerText = "R$ " + total;
}

function remover(i){
    carrinho.splice(i,1);
    render();
}

function gerarPDF(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let nome = document.getElementById("nome").value;
    let marca = document.getElementById("marca").value;
    let modelo = document.getElementById("modelo").value;
    let cor = document.getElementById("cor").value;

    doc.text("IRJ Estética Auto", 10, 10);
    doc.text("Cliente: " + nome, 10, 20);
    doc.text("Veículo: " + marca + " " + modelo, 10, 30);
    doc.text("Cor: " + cor, 10, 40);

    let y = 60;
    let total = 0;

    carrinho.forEach(s=>{
        doc.text(s.nome + " - R$ " + s.preco, 10, y);
        total += s.preco;
        y += 10;
    });

    doc.text("TOTAL: R$ " + total, 10, y+10);

    doc.save("IRJ-nota.pdf");
}

function enviarWhats(){
    let nome = document.getElementById("nome").value;

    let msg = `Olá! Agendamento:%0ANome: ${nome}%0AServiços:%0A`;

    carrinho.forEach(s=>{
        msg += `- ${s.nome} R$${s.preco}%0A`;
    });

    let url = "https://wa.me/5537984185396?text=" + msg;

    window.open(url,"_blank");
}
</script>

</body>
</html>
