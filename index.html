<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRJ Estética Auto</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0f0f0f;
    color:white;
    text-align:center;
}

.logo{
    width:110px;
    margin-top:10px;
    border-radius:10px;
    box-shadow:0 0 10px #00ff99;
}

.container{
    max-width:650px;
    margin:auto;
    padding:10px;
}

input,select{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:6px;
}

.btn{
    width:100%;
    padding:10px;
    margin-top:5px;
    background:#00ff99;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

.btn:hover{background:#00cc77;}

.services{
    text-align:left;
    background:#1c1c1c;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.item{
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #333;
    padding:5px;
}
</style>
</head>

<body>

<img src="logo.png" class="logo">

<h2>IRJ Estética Auto</h2>

<a class="btn" target="_blank" href="https://wa.me/5537984185396">
WhatsApp
</a>

<div class="container">

<h3>Cliente</h3>
<input id="nome" placeholder="Nome">

<!-- MARCAS BRASIL + MUNDO -->
<select id="marca" onchange="carregarModelos()">
<option value="">Selecione a marca</option>

<option>Fiat</option>
<option>Chevrolet</option>
<option>Volkswagen</option>
<option>Ford</option>
<option>Toyota</option>
<option>Honda</option>
<option>Nissan</option>
<option>Hyundai</option>
<option>Kia</option>
<option>Renault</option>
<option>Peugeot</option>
<option>Citroën</option>
<option>Jeep</option>
<option>BMW</option>
<option>Mercedes-Benz</option>
<option>Audi</option>
<option>Volvo</option>
<option>Land Rover</option>
<option>Porsche</option>
<option>Tesla</option>
<option>BYD</option>
<option>Chery</option>
<option>GWM</option>
<option>Haval</option>
<option>MG</option>
</select>

<!-- MODELOS -->
<select id="modelo_select">
<option value="">Selecione o modelo</option>
</select>

<input id="modelo_manual" placeholder="Se não aparecer, digite o modelo manualmente">

<!-- COR -->
<select id="cor">
<option>Cor do veículo</option>
<option>Preto</option><option>Branco</option><option>Prata</option>
<option>Cinza</option><option>Vermelho</option><option>Azul</option>
<option>Verde</option><option>Amarelo</option><option>Bege</option>
</select>

<h3>Serviços</h3>

<select id="servico">
<option>Cristalização de pintura - 300</option>
<option>Polimento técnico - 800</option>
<option>Vitrificação de pintura - 850</option>
<option>Higienização - 350</option>
<option>Vitrificação de faróis - 200</option>
<option>Polimento comercial - 380</option>
<option>Lavagem técnica - 150</option>
<option>Lavagem simples - 80</option>
<option>Lavagem banco tecido - 250</option>
<option>Ducha simples - 40</option>
<option>Lavagem com cera - 100</option>
<option>Aspiração - 40</option>
<option>Motor + chassi - 150</option>
<option>Couro higienização - 240</option>
<option>Couro limpeza - 150</option>
<option>Vidros cristalização - 40</option>
<option>Vidros descontaminação - 140</option>
<option>Pintura descontaminação - 110</option>
<option>Enceramento especial - 50</option>
</select>

<button class="btn" onclick="add()">Adicionar serviço</button>

<div class="services" id="lista"></div>

<h3>Total: <span id="total">0</span></h3>

<button class="btn" onclick="pdf()">Gerar PDF</button>
<button class="btn" onclick="whats()">WhatsApp</button>

</div>

<script>

let carrinho = [];

/* 🔥 MODELOS POR MARCA (SÓ DA MARCA CERTA) */
const modelos = {
Fiat:["Uno","Argo","Mobi","Strada","Toro","Cronos"],
Chevrolet:["Onix","Prisma","Corsa","Tracker","S10","Spin"],
Volkswagen:["Gol","Polo","T-Cross","Nivus","Virtus","Amarok"],
Ford:["Ka","Fiesta","EcoSport","Ranger"],
Toyota:["Corolla","Hilux","Yaris","SW4","RAV4"],
Honda:["Civic","City","HR-V","Fit","CR-V"],
Nissan:["Kicks","Sentra","Versa","Frontier"],
Hyundai:["HB20","Creta","Tucson","Elantra"],
Kia:["Sportage","Seltos","Sorento","Picanto"],
Renault:["Kwid","Sandero","Duster","Logan"],
Jeep:["Renegade","Compass","Commander"],
BMW:["320i","X1","X3","X5","M3"],
"Mercedes-Benz":["C180","C200","GLA","GLC","Classe A"],
Audi:["A3","A4","A5","Q3","Q5"],
Volvo:["XC40","XC60","XC90"],
Tesla:["Model 3","Model Y","Model S","Model X"],
BYD:["Dolphin","Seal","Song Plus","Tan"],
Chery:["Tiggo 5X","Tiggo 7","Tiggo 8"],
GWM:["Haval H6","Poer","Jolion"],
MG:["MG4","ZS","HS"]
};

/* 🔥 CARREGA MODELOS DA MARCA CERTA */
function carregarModelos(){
let marca = document.getElementById("marca").value;
let select = document.getElementById("modelo_select");

select.innerHTML = '<option value="">Selecione o modelo</option>';

if(modelos[marca]){
modelos[marca].forEach(m=>{
let opt = document.createElement("option");
opt.value = m;
opt.text = m;
select.appendChild(opt);
});
}
}

/* SERVIÇOS */
function add(){
let s = document.getElementById("servico").value;
let nome = s.split(" - ")[0];
let preco = Number(s.split(" - ")[1]);

carrinho.push({nome,preco});
render();
}

function render(){
let html = "";
let total = 0;

carrinho.forEach((i,index)=>{
total += i.preco;
html += `
<div class="item">
${i.nome} - R$ ${i.preco}
<button onclick="rem(${index})">X</button>
</div>`;
});

document.getElementById("lista").innerHTML = html;
document.getElementById("total").innerText = total;
}

function rem(i){
carrinho.splice(i,1);
render();
}

/* WHATSAPP */
function whats(){
let nome = document.getElementById("nome").value;
let marca = document.getElementById("marca").value;
let modelo = document.getElementById("modelo_select").value || document.getElementById("modelo_manual").value;

let msg = `Agendamento:%0ANome: ${nome}%0AMarca: ${marca}%0AModelo: ${modelo}%0AServiços:%0A`;

carrinho.forEach(i=>{
msg += `- ${i.nome} R$${i.preco}%0A`;
});

window.open("https://wa.me/5537984185396?text="+msg);
}

/* PDF */
function pdf(){
const { jsPDF } = window.jspdf;
let doc = new jsPDF();

let nome = document.getElementById("nome").value;
let marca = document.getElementById("marca").value;
let modelo = document.getElementById("modelo_select").value || document.getElementById("modelo_manual").value;
let cor = document.getElementById("cor").value;

doc.text("IRJ Estética Auto",10,10);
doc.text("Cliente: "+nome,10,20);
doc.text("Veículo: "+marca+" "+modelo,10,30);
doc.text("Cor: "+cor,10,40);

let y=60;
let total=0;

carrinho.forEach(i=>{
doc.text(i.nome+" R$"+i.preco,10,y);
total+=i.preco;
y+=10;
});

doc.text("TOTAL: R$ "+total,10,y+10);

doc.save("IRJ-agendamento.pdf");
}

</script>

</body>
</html>
