<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRJ Estética Auto</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
--primary:#00ff99;
--bg:#0f0f0f;
--card:#1c1c1c;
--input:#2b2b2b;
--text:#fff;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
padding:10px;
}

/* CONTAINER */
.container{
max-width:600px;
margin:auto;
background:var(--card);
padding:20px;
border-radius:15px;
}

/* LOGO + HEADER */
.header{
text-align:center;
margin-bottom:10px;
}

.logo{
width:120px;
border-radius:20px;
box-shadow:0 0 15px #00ff99;
transition:0.3s;
}

.logo:hover{
transform:scale(1.05);
filter:brightness(1.2);
}

h1{
color:var(--primary);
text-align:center;
margin-top:10px;
}

/* INPUTS */
input,select{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:none;
background:var(--input);
color:#fff;
}

.row{display:flex;gap:10px}

/* SERVIÇOS */
.servicos{
display:grid;
grid-template-columns:1fr;
gap:6px;
}

.servicos label{
background:#222;
padding:10px;
border-radius:10px;
display:block;
}

/* BOTÕES */
button{
width:100%;
padding:15px;
border:none;
margin-top:10px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.btn1{background:#444;color:#fff}
.btn2{background:#25D366;color:#fff}
.btn3{background:var(--primary);color:#000}

/* MODAL */
#modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.9);
}

#modalContent{
background:#fff;
color:#000;
width:90%;
max-width:450px;
margin:10% auto;
padding:20px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGO -->
<div class="header">
    <img src="logo.png" class="logo" alt="IRJ Estética Auto">
    <h1>IRJ Estética Auto</h1>
</div>

<input id="nome" placeholder="Nome">

<div class="row">
<input id="marca" placeholder="Marca">
<input id="carro" placeholder="Modelo">
</div>

<div class="row">
<input id="placa" placeholder="Placa">
<input id="cor" placeholder="Cor">
</div>

<div class="row">
<input type="date" id="data">
<input type="time" id="hora">
</div>

<select id="pagamento">
<option>Pix</option>
<option>Cartão</option>
<option>Dinheiro</option>
</select>

<select id="porte">
<option value="pequeno">Pequeno</option>
<option value="medio">Médio</option>
<option value="grande">Grande</option>
</select>

<h3>Serviços</h3>

<div class="servicos" id="servicos">

<label><input type="checkbox" value="Cristalização de pintura"> Cristalização de pintura</label>
<label><input type="checkbox" value="Polimento técnico"> Polimento técnico</label>
<label><input type="checkbox" value="Vitrificação de pintura"> Vitrificação de pintura</label>
<label><input type="checkbox" value="Higienização"> Higienização interna</label>
<label><input type="checkbox" value="Vitrificação de faróis"> Vitrificação de faróis</label>
<label><input type="checkbox" value="Polimento comercial"> Polimento comercial</label>
<label><input type="checkbox" value="Lavagem técnica"> Lavagem técnica</label>
<label><input type="checkbox" value="Lavagem simples"> Lavagem simples</label>
<label><input type="checkbox" value="Lavagem banco de tecido"> Lavagem banco tecido</label>
<label><input type="checkbox" value="Ducha simples"> Ducha simples</label>
<label><input type="checkbox" value="Lavagem com cera"> Lavagem com cera</label>
<label><input type="checkbox" value="Aspiração"> Aspiração</label>
<label><input type="checkbox" value="Lavagem de motor mais chassi"> Motor e chassi</label>
<label><input type="checkbox" value="Higienização de bancos de couro"> Higienização couro</label>
<label><input type="checkbox" value="Limpeza e hidratação de couro"> Hidratação couro</label>
<label><input type="checkbox" value="Cristalização de vidros"> Cristalização de vidros</label>
<label><input type="checkbox" value="Descontaminação de vidros"> Descontaminação de vidros</label>
<label><input type="checkbox" value="Descontaminação de pintura"> Descontaminação pintura</label>
<label><input type="checkbox" value="Enceramento especial"> Enceramento especial</label>

</div>

<button class="btn1" onclick="revisar()">Revisão</button>
<button class="btn2" onclick="whats()">WhatsApp</button>
<button class="btn3" onclick="pdf()">PDF</button>

</div>

<!-- MODAL -->
<div id="modal">
<div id="modalContent">
<h3>Resumo</h3>
<div id="resumo"></div>
<button onclick="fechar()">Fechar</button>
</div>
</div>

<script>

const precos={
"Cristalização de pintura":{pequeno:300,medio:450,grande:650},
"Polimento técnico":{pequeno:800,medio:1100,grande:1500},
"Vitrificação de pintura":{pequeno:850,medio:950,grande:1100},
"Higienização":{pequeno:350,medio:450,grande:550},
"Vitrificação de faróis":{pequeno:200,medio:230,grande:270},
"Polimento comercial":{pequeno:380,medio:480,grande:580},
"Lavagem técnica":{pequeno:150,medio:190,grande:290},
"Lavagem simples":{pequeno:80,medio:100,grande:130},
"Lavagem banco de tecido":{pequeno:250,medio:300,grande:350},
"Ducha simples":{pequeno:40,medio:50,grande:60},
"Lavagem com cera":{pequeno:100,medio:130,grande:160},
"Aspiração":{pequeno:40,medio:50,grande:60},
"Lavagem de motor mais chassi":{pequeno:150,medio:200,grande:300},
"Higienização de bancos de couro":{pequeno:240,medio:290,grande:370},
"Limpeza e hidratação de couro":{pequeno:150,medio:160,grande:170},
"Cristalização de vidros":{pequeno:40,medio:65,grande:85},
"Descontaminação de vidros":{pequeno:140,medio:170,grande:240},
"Descontaminação de pintura":{pequeno:110,medio:140,grande:190},
"Enceramento especial":{pequeno:50,medio:50,grande:50}
};

function dados(){
return{
nome:nome.value,
marca:marca.value,
carro:carro.value,
placa:placa.value,
cor:cor.value,
data:data.value,
hora:hora.value,
pagamento:pagamento.value,
porte:porte.value,
itens:[...servicos.querySelectorAll("input:checked")]
};
}

function revisar(){
let d=dados();
let total=0,txt="";

d.itens.forEach(i=>{
let p=precos[i.value][d.porte];
total+=p;
txt+=`<p>${i.value} - R$ ${p}</p>`;
});

resumo.innerHTML=`
<b>Cliente:</b> ${d.nome}<br>
<b>Veículo:</b> ${d.marca} ${d.carro}<br>
<b>Placa:</b> ${d.placa}<br><br>
${txt}<br>
<b>Total: R$ ${total}</b>
`;

modal.style.display="block";
}

function fechar(){
modal.style.display="none";
}

function whats(){
let d=dados();
let total=0,msg="";

d.itens.forEach(i=>{
let p=precos[i.value][d.porte];
total+=p;
msg+=`✔ ${i.value} R$ ${p}%0A`;
});

let url=
`https://wa.me/5537984185396?text=`+
`Cliente: ${d.nome}%0A`+
`Veículo: ${d.marca} ${d.carro}%0A`+
`Placa: ${d.placa}%0A`+
`Data: ${d.data} ${d.hora}%0A%0A`+
msg+
`%0ATotal: R$ ${total}`;

window.open(url,"_blank");
}

function pdf(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();
let d=dados();
let y=20,total=0;

doc.text("IRJ ESTÉTICA AUTO",10,y);y+=10;

d.itens.forEach(i=>{
let p=precos[i.value][d.porte];
total+=p;
doc.text(i.value+" - R$ "+p,10,y);
y+=10;
});

doc.text("TOTAL: R$ "+total,10,y+10);
doc.save("orcamento.pdf");
}

</script>

</body>
</html>
