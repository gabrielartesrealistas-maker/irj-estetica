<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>IRJ Estética Auto</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family: Arial;
background:#0f0f0f;
color:white;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:#1c1c1c;
padding:20px;
border-radius:12px;
}

h1{
text-align:center;
color:#00ff99;
}

input, select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#00ff99;
font-weight:bold;
cursor:pointer;
}

.servicos label{
display:block;
margin:5px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>IRJ Estética Auto</h1>

<!-- LOGO -->
<div style="text-align:center;">
<img src="logo.png" style="width:120px;border-radius:10px;">
</div>

<input id="nome" placeholder="Nome do cliente">
<input id="marca" placeholder="Marca do veículo">
<input id="carro" placeholder="Modelo do veículo">
<input id="placa" placeholder="Placa">
<input id="ano" placeholder="Ano (opcional)">
<input id="cor" placeholder="Cor do veículo">

<input type="date" id="data">
<input type="time" id="hora">

<select id="pagamento">
<option value="">Forma de pagamento</option>
<option>Pix</option>
<option>Cartão de Crédito</option>
<option>Dinheiro</option>
</select>

<select id="porte">
<option value="pequeno">Pequeno</option>
<option value="medio">Médio</option>
<option value="grande">Grande</option>
</select>

<h3>Serviços</h3>

<div class="servicos">

<label><input type="checkbox" value="Cristalização de pintura"> Cristalização de pintura</label>
<label><input type="checkbox" value="Polimento técnico"> Polimento técnico</label>
<label><input type="checkbox" value="Vitrificação de pintura"> Vitrificação de pintura</label>
<label><input type="checkbox" value="Higienização"> Higienização</label>
<label><input type="checkbox" value="Vitrificação de faróis"> Vitrificação de faróis</label>
<label><input type="checkbox" value="Polimento comercial"> Polimento comercial</label>
<label><input type="checkbox" value="Lavagem técnica"> Lavagem técnica</label>
<label><input type="checkbox" value="Lavagem simples"> Lavagem simples</label>
<label><input type="checkbox" value="Lavagem banco de tecido"> Lavagem banco de tecido</label>
<label><input type="checkbox" value="Ducha simples"> Ducha simples</label>
<label><input type="checkbox" value="Lavagem com cera"> Lavagem com cera</label>
<label><input type="checkbox" value="Aspiração"> Aspiração</label>
<label><input type="checkbox" value="Lavagem de motor mais chassi"> Lavagem motor e chassi</label>
<label><input type="checkbox" value="Higienização de bancos de couro"> Higienização couro</label>
<label><input type="checkbox" value="Limpeza e hidratação de couro"> Hidratação couro</label>
<label><input type="checkbox" value="Cristalização de vidros"> Cristalização vidros</label>
<label><input type="checkbox" value="Descontaminação de vidros"> Descontaminação vidros</label>
<label><input type="checkbox" value="Descontaminação de pintura"> Descontaminação pintura</label>
<label><input type="checkbox" value="Enceramento especial"> Enceramento especial</label>

</div>

<button onclick="whats()">Enviar WhatsApp</button>
<button onclick="pdf()">Gerar Nota Fiscal PDF</button>

</div>

<script>

const precos = {
"Cristalização de pintura":{pequeno:300,medio:450,grande:650},
"Polimento técnico":{pequeno:800,medio:1100,grande:1500},
"Vitrificação de pintura":{pequeno:850,medio:950,grande:1100},
"Higienização":{pequeno:350,medio:450,grande:550},
"Vitrificação de faróis":{pequeno:200,medio:230,grande:270},
"Polimento comercial":{pequeno:380,medio:480,grande:580},
"Lavagem técnica":{pequeno:150,medio:190,grande:290},
"Lavagem simples":{pequeno:80,medio:100,grande:130},
"Lavagem banco de tecido":{pequeno:250,medio:300,grande:350},
"Ducha simples":{pequeno:40,medio:50,grande:60},
"Lavagem com cera":{pequeno:100,medio:130,grande:160},
"Aspiração":{pequeno:40,medio:50,grande:60},
"Lavagem de motor mais chassi":{pequeno:150,medio:200,grande:300},
"Higienização de bancos de couro":{pequeno:240,medio:290,grande:370},
"Limpeza e hidratação de couro":{pequeno:150,medio:160,grande:170},
"Cristalização de vidros":{pequeno:40,medio:65,grande:85},
"Descontaminação de vidros":{pequeno:140,medio:170,grande:240},
"Descontaminação de pintura":{pequeno:110,medio:140,grande:190},
"Enceramento especial":{pequeno:50,medio:50,grande:50}
};

function getDados(){
return {
nome:document.getElementById("nome").value,
marca:document.getElementById("marca").value,
carro:document.getElementById("carro").value,
placa:document.getElementById("placa").value,
ano:document.getElementById("ano").value,
cor:document.getElementById("cor").value,
data:document.getElementById("data").value,
hora:document.getElementById("hora").value,
pagamento:document.getElementById("pagamento").value,
porte:document.getElementById("porte").value,
itens:[...document.querySelectorAll(".servicos input:checked")]
};
}

function whats(){

let d = getDados();
let total=0;
let lista="";

d.itens.forEach(i=>{
let n=i.value;
let p=precos[n][d.porte];
total+=p;
lista+=`- ${n}\n`;
});

let msg=`🚗 IRJ ESTÉTICA AUTO

Nome: ${d.nome}
Marca: ${d.marca}
Veículo: ${d.carro}
Placa: ${d.placa}
Data: ${d.data} ${d.hora}
Pagamento: ${d.pagamento}

Serviços:
${lista}

TOTAL: R$ ${total}`;

let url="https://wa.me/5537984185396?text="+encodeURIComponent(msg);
window.open(url,"_blank");
}

function pdf(){

let d=getDados();
let total=0;

const { jsPDF }=window.jspdf;
let doc=new jsPDF();

let n=Math.floor(Math.random()*999999);

doc.text("IRJ ESTÉTICA AUTO",60,10);
doc.text("NOTA DE SERVIÇO",70,18);
doc.text("Nº "+n,10,30);

doc.text("Cliente: "+d.nome,10,40);
doc.text("Marca: "+d.marca,10,48);
doc.text("Veículo: "+d.carro,10,56);
doc.text("Placa: "+d.placa,10,64);
doc.text("Data: "+d.data+" "+d.hora,10,72);
doc.text("Pagamento: "+d.pagamento,10,80);

let y=95;

d.itens.forEach(i=>{
let n=i.value;
let p=precos[n][d.porte];
total+=p;
doc.text(n+" - R$ "+p,10,y);
y+=8;
});

doc.text("TOTAL: R$ "+total,10,y+10);

doc.save("nota_irj_"+n+".pdf");
}

</script>

</body>
</html>
