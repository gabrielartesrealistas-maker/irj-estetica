<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRJ Estética Auto</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
}

header{
padding:20px;
}

.logo{
width:120px;
border-radius:10px;
}

.btn{
background:#00ff99;
color:black;
padding:10px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin:5px;
}

.services{
max-width:900px;
margin:auto;
text-align:left;
padding:10px;
}

.services div{
font-size:12px;
opacity:0.8;
border-bottom:1px solid #222;
padding:4px 0;
}

form{
max-width:500px;
margin:auto;
background:#1c1c1c;
padding:15px;
border-radius:10px;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:5px;
}

#listaServicos div{
display:flex;
justify-content:space-between;
font-size:13px;
margin:5px 0;
}
</style>

</head>

<body>

<header>

<img src="logo.png" class="logo">

<h1>IRJ Estética Auto</h1>

<a class="btn" href="https://wa.me/5537984185396" target="_blank">
WhatsApp
</a>

</header>

<h2>Serviços</h2>

<div class="services">
<div>Cristalização pintura - R$300</div>
<div>Polimento técnico - R$1100</div>
<div>Vitrificação - R$950</div>
<div>Higienização - R$350</div>
<div>Lavagem técnica - R$150</div>
<div>Lavagem simples - R$80</div>
<div>Enceramento - R$50</div>
</div>

<h2>Agendamento</h2>

<form>

<input id="nome" placeholder="Nome">
<input id="placa" placeholder="Placa">
<input id="modelo" placeholder="Modelo">
<input id="marca" placeholder="Marca">

<select id="porte">
<option>Pequeno</option>
<option>Médio</option>
<option>Grande</option>
</select>

<input id="cor" placeholder="Cor">
<input id="ano" placeholder="Ano">

<input type="date" id="data">
<input type="time" id="hora">

<h3>Serviços</h3>

<select id="servicoSelect">
<option value="300">Cristalização pintura</option>
<option value="1100">Polimento técnico</option>
<option value="950">Vitrificação</option>
<option value="350">Higienização</option>
<option value="150">Lavagem técnica</option>
<option value="80">Lavagem simples</option>
<option value="50">Enceramento</option>
</select>

<button type="button" class="btn" onclick="add()">Adicionar Serviço</button>

<div id="lista"></div>

<h3>Total: R$ <span id="total">0</span></h3>

<button type="button" class="btn" onclick="revisar()">Revisar</button>

</form>

<div id="resumo" style="display:none;max-width:500px;margin:auto;background:#111;padding:15px;border-radius:10px;text-align:left;"></div>

<button class="btn" onclick="whats()">WhatsApp</button>
<button class="btn" onclick="pdf()">Baixar PDF</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

let dados = {
servicos: [],
total: 0
};

function add(){

let sel = document.getElementById("servicoSelect");
let nome = sel.options[sel.selectedIndex].text;
let valor = parseFloat(sel.value);

dados.servicos.push({nome, valor});
atualizar();
}

function atualizar(){

let html = "";
dados.total = 0;

dados.servicos.forEach((s,i)=>{
html += `<div>${s.nome} - R$ ${s.valor} <button onclick="remover(${i})">❌</button></div>`;
dados.total += s.valor;
});

document.getElementById("lista").innerHTML = html;
document.getElementById("total").innerText = dados.total;
}

function remover(i){
dados.servicos.splice(i,1);
atualizar();
}

function revisar(){

dados.nome = nome.value;
dados.placa = placa.value;
dados.modelo = modelo.value;
dados.marca = marca.value;
dados.porte = porte.value;
dados.cor = cor.value;
dados.ano = ano.value;
dados.data = data.value;
dados.hora = hora.value;

document.getElementById("resumo").style.display = "block";

resumo.innerHTML = `
<h3>Resumo</h3>
Nome: ${dados.nome}<br>
Veículo: ${dados.marca} ${dados.modelo}<br>
Porte: ${dados.porte}<br><br>
Serviços:<br>
${dados.servicos.map(s=>"• "+s.nome).join("<br>")}<br><br>
TOTAL: R$ ${dados.total}<br>
Data: ${dados.data} ${dados.hora}
`;
}

function whats(){

let msg = `IRJ Estética Auto

Nome: ${dados.nome}
Veículo: ${dados.marca} ${dados.modelo}
Placa: ${dados.placa}

Serviços:
${dados.servicos.map(s=>"• "+s.nome).join("\n")}

TOTAL: R$ ${dados.total}
Data: ${dados.data} ${dados.hora}`;

window.open("https://wa.me/5537984185396?text="+encodeURIComponent(msg));
}

function pdf(){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let logo = new Image();
logo.src = "logo.png";

logo.onload = function(){

doc.addImage(logo, "PNG", 70, 10, 60, 30);

doc.setFontSize(16);
doc.text("IRJ Estética Auto", 20, 50);

doc.setFontSize(12);
doc.text("NOTA DE AGENDAMENTO", 20, 60);

doc.text("Nome: " + dados.nome, 20, 75);
doc.text("Veículo: " + dados.marca + " " + dados.modelo, 20, 85);
doc.text("Placa: " + dados.placa, 20, 95);
doc.text("Porte: " + dados.porte, 20, 105);

let y = 120;

doc.text("Serviços:", 20, y);

y += 10;

dados.servicos.forEach(s=>{
doc.text("- " + s.nome + " R$ " + s.valor, 25, y);
y += 10;
});

doc.text("TOTAL: R$ " + dados.total, 20, y+10);
doc.text("Data: " + dados.data + " " + dados.hora, 20, y+20);

doc.save("IRJ-nota.pdf");

};

}

</script>

</body>
</html>
