<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <!-- A LINHA ABAIXO É O QUE RESOLVE O PROBLEMA DO TAMANHO NO CELULAR -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRJ Estética Auto</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primary: #00ff99;
            --bg: #0f0f0f;
            --card: #1c1c1c;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px; /* Reduzi o padding para ganhar espaço no celular */
        }

        .container {
            max-width: 600px; /* Melhor para leitura centralizada */
            margin: auto;
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .logo {
            width: 100px;
            height: auto;
            display: block;
            margin: 0 auto 20px;
            border-radius: 50%; /* Deixa a logo redonda se for quadrada */
            border: 2px solid var(--primary);
        }

        /* AJUSTE DOS INPUTS PARA CELULAR */
        input, select {
            width: 100%;
            padding: 12px; /* Maior para facilitar o toque */
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #333;
            background: #2b2b2b;
            color: white;
            font-size: 16px; /* Evita que o iPhone dê zoom automático no input */
            box-sizing: border-box;
        }

        h3 {
            border-bottom: 1px solid var(--primary);
            padding-bottom: 5px;
            margin-top: 25px;
            color: var(--primary);
        }

        /* GRID DE SERVIÇOS - Fica em 2 colunas no PC e 1 no Celular */
        .servicos {
            display: grid;
            grid-template-columns: 1fr; 
            gap: 10px;
            margin: 15px 0;
        }

        .servicos label {
            background: #2b2b2b;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .servicos label:active { background: #444; }

        .servicos input[type="checkbox"] {
            width: auto;
            margin-right: 15px;
            transform: scale(1.5); /* Checkbox maior para o dedo acertar */
        }

        /* BOTÕES ESTILO APP */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-revisar { background: #555; color: white; }
        .btn-whats { background: #25D366; color: white; }
        .btn-pdf { background: var(--primary); color: #000; }

        button:active { transform: scale(0.98); }

        /* MODAL RESPONSIVO */
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
        }

        #modalContent {
            background: #fff;
            color: #000;
            width: 85%;
            margin: 10% auto;
            padding: 20px;
            border-radius: 12px;
            max-height: 80vh;
            overflow-y: auto;
        }

        @media (min-width: 480px) {
            .servicos { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>

<body>

<div class="container">
    <img src="logo.png" alt="Logo" class="logo">
    <h1>IRJ Estética Auto</h1>

    <input id="nome" placeholder="Nome do cliente">
    <div style="display: flex; gap: 10px;">
        <input id="marca" placeholder="Marca (Ex: Fiat)">
        <input id="carro" placeholder="Modelo (Ex: Argo)">
    </div>
    <div style="display: flex; gap: 10px;">
        <input id="placa" placeholder="Placa">
        <input id="cor" placeholder="Cor">
    </div>
    
    <div style="display: flex; gap: 10px;">
        <input type="date" id="data">
        <input type="time" id="hora">
    </div>

    <select id="pagamento">
        <option value="">Forma de pagamento</option>
        <option>Pix</option>
        <option>Cartão de Crédito</option>
        <option>Dinheiro</option>
    </select>

    <label style="font-size: 14px; color: #888;">Porte do Veículo:</label>
    <select id="porte">
        <option value="pequeno">Pequeno (ex: Mobi, Kwid)</option>
        <option value="medio">Médio (ex: Sedan, SUV compacta)</option>
        <option value="grande">Grande (ex: Hilux, SW4)</option>
    </select>

    <h3>Selecione os Serviços</h3>
    <div class="servicos" id="listaServicos">
        <!-- Lista simplificada para o exemplo, você pode manter todos os seus -->
        <label><input type="checkbox" value="Lavagem simples"> Lavagem simples</label>
        <label><input type="checkbox" value="Lavagem técnica"> Lavagem técnica</label>
        <label><input type="checkbox" value="Higienização"> Higienização</label>
        <label><input type="checkbox" value="Polimento técnico"> Polimento técnico</label>
        <label><input type="checkbox" value="Vitrificação de pintura"> Vitrificação</label>
        <label><input type="checkbox" value="Enceramento especial"> Enceramento</label>
        <!-- Adicione os outros da mesma forma -->
    </div>

    <div class="btn-group">
        <button class="btn-revisar" onclick="revisar()">🔍 Revisar Agendamento</button>
        <button class="btn-whats" onclick="whats()">🟢 Enviar WhatsApp</button>
        <button class="btn-pdf" onclick="pdf()">📄 Gerar Orçamento PDF</button>
    </div>
</div>

<!-- O RESTO DO SEU SCRIPT CONTINUA IGUAL (Pode manter o mesmo JS que você já tinha) -->

<div id="modal">
    <div id="modalContent">
        <h2 style="margin-top:0">Resumo do Pedido</h2>
        <div id="resumo"></div>
        <button class="btn-revisar" onclick="document.getElementById('modal').style.display='none'">Voltar e Ajustar</button>
    </div>
</div>

<script>
// Mantenha aqui a sua constante 'precos' e as funções 'getDados', 'revisar', 'whats' e 'pdf' que você já escreveu.
// Eles funcionarão perfeitamente com este novo visual.

const precos = {
    "Lavagem simples":{pequeno:80,medio:100,grande:130},
    "Lavagem técnica":{pequeno:150,medio:190,grande:290},
    "Higienização":{pequeno:350,medio:450,grande:550},
    "Polimento técnico":{pequeno:800,medio:1100,grande:1500},
    "Vitrificação de pintura":{pequeno:850,medio:950,grande:1100},
    "Enceramento especial":{pequeno:50,medio:50,grande:50}
    // Adicione os outros preços aqui conforme sua lista original
};

function getDados(){
    return {
        nome:document.getElementById("nome").value,
        marca:document.getElementById("marca").value,
        carro:document.getElementById("carro").value,
        placa:document.getElementById("placa").value,
        cor:document.getElementById("cor").value,
        data:document.getElementById("data").value,
        hora:document.getElementById("hora").value,
        pagamento:document.getElementById("pagamento").value,
        porte:document.getElementById("porte").value,
        itens:[...document.querySelectorAll(".servicos input:checked")]
    };
}

function revisar(){
    let d=getDados();
    let total=0;
    let txt="";
    if(d.itens.length === 0) { alert("Selecione ao menos um serviço!"); return; }

    d.itens.forEach(i=>{
        let n=i.value;
        let p=precos[n][d.porte];
        total+=p;
        txt+=`<p>✅ ${n}: <b>R$ ${p}</b></p>`;
    });

    document.getElementById("resumo").innerHTML=`
        <p><b>Cliente:</b> ${d.nome}</p>
        <p><b>Veículo:</b> ${d.marca} ${d.carro} (${d.cor})</p>
        <p><b>Placa:</b> ${d.placa}</p>
        <p><b>Data/Hora:</b> ${d.data} às ${d.hora}</p>
        <hr>
        ${txt}
        <hr>
        <h3 style="color:black">Total: R$ ${total}</h3>
    `;
    document.getElementById("modal").style.display="block";
}

function whats(){
    let d=getDados();
    let total=0;
    let lista="";
    d.itens.forEach(i=>{
        let n=i.value;
        let p=precos[n][d.porte];
        total+=p;
        lista+=`- ${n}: R$ ${p}\n`;
    });

    let msg=`🚗 *IRJ ESTÉTICA AUTO*\n\n*Cliente:* ${d.nome}\n*Veículo:* ${d.carro}\n*Placa:* ${d.placa}\n*Data:* ${d.data} ${d.hora}\n\n*Serviços:*\n${lista}\n*TOTAL: R$ ${total}*\n\n_Forma de Pagamento: ${d.pagamento}_`;
    let url="https://wa.me/5537984185396?text="+encodeURIComponent(msg);
    window.open(url,"_blank");
}

function pdf(){
    let d=getDados();
    let total=0;
    const { jsPDF }=window.jspdf;
    let doc=new jsPDF();
    doc.setFontSize(18);
    doc.text("IRJ ESTÉTICA AUTO", 10, 20);
    doc.setFontSize(12);
    doc.text(`Cliente: ${d.nome}`, 10, 40);
    doc.text(`Veículo: ${d.marca} ${d.carro} - ${d.placa}`, 10, 50);
    doc.text(`Data: ${d.data}`, 10, 60);
    
    let y = 80;
    doc.text("Serviços:", 10, 70);
    d.itens.forEach(i=>{
        let n=i.value;
        let p=precos[n][d.porte];
        total+=p;
        doc.text(`- ${n}: R$ ${p}`, 15, y);
        y+=10;
    });
    
    doc.setFontSize(14);
    doc.text(`TOTAL: R$ ${total}`, 10, y+10);
    doc.save(`Orçamento_${d.nome}.pdf`);
}
</script>

</body>
</html>
