<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRJ Estética Auto</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0f0f0f;
    color:white;
    text-align:center;
}

.logo{
    width:110px;
    margin-top:10px;
    border-radius:10px;
    box-shadow:0 0 10px #00ff99;
}

.container{
    max-width:650px;
    margin:auto;
    padding:10px;
}

input,select{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:6px;
}

.btn{
    width:100%;
    padding:10px;
    margin-top:5px;
    background:#00ff99;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

.btn:hover{background:#00cc77;}

.services{
    text-align:left;
    background:#1c1c1c;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.item{
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #333;
    padding:5px;
}

/* MODAL REVISÃO */
.modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
}

.modal-content{
    background:#1c1c1c;
    width:90%;
    max-width:500px;
    margin:50px auto;
    padding:15px;
    border-radius:10px;
}
</style>
</head>

<body>

<img src="logo.png" class="logo">

<h2>IRJ Estética Auto</h2>

<div class="container">

<input id="nome" placeholder="Nome">

<select id="marca" onchange="carregarModelos()">
<option value="">Marca</option>
<option>Toyota</option><option>Honda</option><option>Nissan</option>
<option>Hyundai</option><option>Kia</option>
<option>Volkswagen</option><option>Chevrolet</option>
<option>BMW</option><option>Mercedes-Benz</option>
<option>Audi</option><option>BYD</option>
<option>Tesla</option>
</select>

<select id="modelo">
<option>Modelo (sugestão)</option>
</select>

<input id="modelo_manual" placeholder="Modelo manual (opcional)">

<select id="cor">
<option>Cor</option>
<option>Preto</option><option>Branco</option><option>Cinza</option>
<option>Vermelho</option><option>Azul</option><option>Verde</option>
</select>

<h3>Serviços</h3>

<select id="servico">
<option>Cristalização de pintura - 300</option>
<option>Polimento técnico - 800</option>
<option>Vitrificação - 850</option>
<option>Higienização - 350</option>
<option>Lavagem simples - 80</option>
<option>Lavagem técnica - 150</option>
<option>Enceramento - 50</option>
</select>

<button class="btn" onclick="add()">Adicionar serviço</button>

<div class="services" id="lista"></div>

<h3>Total: <span id="total">0</span></h3>

<button class="btn" onclick="revisar()">Revisar agendamento</button>
<button class="btn" onclick="pdf()">Gerar PDF</button>
<button class="btn" onclick="whats()">WhatsApp</button>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3>Revisão do Agendamento</h3>

<div id="resumo"></div>

<button class="btn" onclick="fecharModal()">Fechar</button>
<button class="btn" onclick="editar()">Editar</button>
</div>
</div>

<script>

let carrinho = [];

function add(){
let s = document.getElementById("servico").value;
let nome = s.split(" - ")[0];
let preco = Number(s.split(" - ")[1]);

carrinho.push({nome,preco});
render();
}

function render(){
let html = "";
let total = 0;

carrinho.forEach((i,index)=>{
total += i.preco;
html += `<div class="item">
${i.nome} - R$ ${i.preco}
<button onclick="rem(${index})">X</button>
</div>`;
});

document.getElementById("lista").innerHTML = html;
document.getElementById("total").innerText = total;
}

function rem(i){
carrinho.splice(i,1);
render();
}

/* 🔥 REVISÃO */
function revisar(){
let nome = document.getElementById("nome").value;
let marca = document.getElementById("marca").value;
let modelo = document.getElementById("modelo").value;
let manual = document.getElementById("modelo_manual").value;
let cor = document.getElementById("cor").value;

let resumo = `
<p><b>Nome:</b> ${nome}</p>
<p><b>Veículo:</b> ${marca} ${modelo || manual}</p>
<p><b>Cor:</b> ${cor}</p>
<p><b>Serviços:</b></p>
`;

let total = 0;

carrinho.forEach(i=>{
resumo += `<p>${i.nome} - R$ ${i.preco}</p>`;
total += i.preco;
});

resumo += `<hr><p><b>Total: R$ ${total}</b></p>`;

document.getElementById("resumo").innerHTML = resumo;
document.getElementById("modal").style.display = "block";
}

function fecharModal(){
document.getElementById("modal").style.display = "none";
}

function editar(){
fecharModal();
window.scrollTo(0,0);
}

/* WHATS */
function whats(){
let nome = document.getElementById("nome").value;

let msg = `Agendamento:%0ANome: ${nome}%0A`;

carrinho.forEach(i=>{
msg += `- ${i.nome} R$${i.preco}%0A`;
});

window.open("https://wa.me/5537984185396?text="+msg);
}

/* PDF */
function pdf(){
const { jsPDF } = window.jspdf;
let doc = new jsPDF();

let nome = document.getElementById("nome").value;
let marca = document.getElementById("marca").value;
let modelo = document.getElementById("modelo").value || document.getElementById("modelo_manual").value;
let cor = document.getElementById("cor").value;

doc.text("IRJ Estética Auto",10,10);
doc.text("Cliente: "+nome,10,20);
doc.text("Veículo: "+marca+" "+modelo,10,30);
doc.text("Cor: "+cor,10,40);

let y=60;
let total=0;

carrinho.forEach(i=>{
doc.text(i.nome+" R$"+i.preco,10,y);
total+=i.preco;
y+=10;
});

doc.text("TOTAL: R$ "+total,10,y+10);

doc.save("IRJ-agendamento.pdf");
}

</script>

</body>
</html>
