<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRJ Estética Auto</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0f0f0f;
    color:white;
    text-align:center;
}

/* LOGO */
.logo{
    width:140px;
    margin-top:20px;
    border-radius:15px;
    box-shadow:0 0 15px #00ff99;
}

/* HEADER */
header{
    padding:20px;
}

/* SERVIÇOS */
.services{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
    gap:10px;
    padding:20px;
}

.service{
    background:#1c1c1c;
    padding:15px;
    border-radius:10px;
    border:1px solid #00ff99;
}

/* FORM */
form{
    margin:20px auto;
    max-width:400px;
    background:#1c1c1c;
    padding:20px;
    border-radius:10px;
}

input, select{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:5px;
}

/* BOTÃO */
.btn{
    background:#00ff99;
    color:black;
    padding:12px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    width:100%;
    text-decoration:none;
    display:inline-block;
}

.btn:hover{
    background:#00cc77;
}
</style>

</head>

<body>

<header>

<img src="logo.png" class="logo" alt="IRJ Estética Auto">

<h1>IRJ Estética Auto</h1>
<p>Seu carro merece o melhor cuidado estético!</p>

<!-- WHATSAPP CORRIGIDO -->
<a class="btn" href="https://wa.me/5537984185396" target="_blank">
Falar no WhatsApp
</a>

</header>

<h2>Serviços</h2>

<div class="services">
<div class="service">Lavagem completa</div>
<div class="service">Polimento técnico</div>
<div class="service">Vitrificação</div>
<div class="service">Higienização interna</div>
<div class="service">Cristalização</div>
<div class="service">Enceramento premium</div>
<div class="service">Restauração de farol</div>
<div class="service">Detailing completo</div>
<div class="service">Limpeza de motor</div>
<div class="service">Proteção de pintura</div>
</div>

<h2>Agendamento</h2>

<form onsubmit="enviarWhats(event)">

<input type="text" id="nome" placeholder="Seu nome" required>
<input type="text" id="carro" placeholder="Modelo do veículo" required>

<select id="servico">
    <option>Lavagem completa</option>
    <option>Polimento técnico</option>
    <option>Vitrificação</option>
    <option>Higienização interna</option>
    <option>Cristalização</option>
</select>

<button class="btn" type="submit">Agendar Agora</button>

</form>

<script>
function enviarWhats(event){
    event.preventDefault();

    let nome = document.getElementById("nome").value;
    let carro = document.getElementById("carro").value;
    let servico = document.getElementById("servico").value;

    let msg = `Olá! Quero agendar:%0ANome: ${nome}%0ACarro: ${carro}%0AServiço: ${servico}`;

    let url = `https://wa.me/5537984185396?text=${msg}`;

    window.open(url, "_blank");
}
</script>

</body>
</html>
