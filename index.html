<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRJ Estética Auto</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:#fff;
}

header{
text-align:center;
padding:20px;
background:#111827;
}

.logo{width:120px;}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

input, select, button{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:none;
font-size:16px;
}

.services{
background:#1f2937;
padding:15px;
border-radius:10px;
}

button{
background:#38bdf8;
font-weight:bold;
cursor:pointer;
}

#resumo{
background:#111827;
padding:15px;
margin-top:15px;
border-radius:10px;
}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
<h1>IRJ ESTÉTICA AUTO</h1>
</header>

<div class="container">

<input type="text" id="nome" placeholder="Seu nome">

<input type="text" id="marca" placeholder="Marca do veículo (ex: Toyota, BMW)">

<input type="text" id="carro" placeholder="Modelo do veículo">

<input type="text" id="placa" placeholder="Placa do veículo">

<input type="number" id="ano" placeholder="Ano do veículo (opcional)">

<label>Cor do veículo:</label>
<input type="color" id="cor">

<select id="porte">
<option value="">Selecione o porte</option>
<option value="pequeno">Pequeno</option>
<option value="medio">Médio</option>
<option value="grande">Grande</option>
</select>

<h3>Serviços (pode selecionar vários)</h3>

<div class="services">

<label><input type="checkbox" value="Cristalização de pintura"> Cristalização de pintura</label>
<label><input type="checkbox" value="Polimento técnico"> Polimento técnico</label>
<label><input type="checkbox" value="Vitrificação de pintura"> Vitrificação de pintura</label>
<label><input type="checkbox" value="Higienização"> Higienização interna</label>
<label><input type="checkbox" value="Vitrificação de faróis"> Vitrificação de faróis</label>
<label><input type="checkbox" value="Polimento comercial"> Polimento comercial</label>
<label><input type="checkbox" value="Lavagem técnica"> Lavagem técnica</label>
<label><input type="checkbox" value="Lavagem simples"> Lavagem simples</label>
<label><input type="checkbox" value="Lavagem banco de tecido"> Lavagem banco de tecido</label>
<label><input type="checkbox" value="Ducha simples"> Ducha simples</label>
<label><input type="checkbox" value="Lavagem com cera"> Lavagem com cera</label>
<label><input type="checkbox" value="Aspiração"> Aspiração</label>
<label><input type="checkbox" value="Lavagem motor e chassi"> Lavagem motor e chassi</label>
<label><input type="checkbox" value="Higienização de bancos de couro"> Higienização de bancos de couro</label>
<label><input type="checkbox" value="Limpeza e hidratação de couro"> Limpeza e hidratação de couro</label>
<label><input type="checkbox" value="Cristalização de vidros"> Cristalização de vidros</label>
<label><input type="checkbox" value="Descontaminação de vidros"> Descontaminação de vidros</label>
<label><input type="checkbox" value="Descontaminação de pintura"> Descontaminação de pintura</label>
<label><input type="checkbox" value="Enceramento especial"> Enceramento especial</label>

</div>

<button onclick="resumo()">Ver Resumo</button>
<button onclick="agendar()">Agendar no WhatsApp</button>
<button onclick="baixarPDF()">Baixar PDF</button>

<div id="resumo"></div>

</div>

<script>

const precos = {
"Cristalização de pintura": { pequeno:300, medio:450, grande:650 },
"Polimento técnico": { pequeno:800, medio:1100, grande:1500 },
"Vitrificação de pintura": { pequeno:850, medio:950, grande:1100 },
"Higienização": { pequeno:350, medio:450, grande:550 },
"Vitrificação de faróis": { pequeno:200, medio:230, grande:270 },
"Polimento comercial": { pequeno:380, medio:480, grande:580 },
"Lavagem técnica": { pequeno:150, medio:190, grande:290 },
"Lavagem simples": { pequeno:80, medio:100, grande:130 },
"Lavagem banco de tecido": { pequeno:250, medio:300, grande:350 },
"Ducha simples": { pequeno:40, medio:50, grande:60 },
"Lavagem com cera": { pequeno:100, medio:130, grande:160 },
"Aspiração": { pequeno:40, medio:50, grande:60 },
"Lavagem motor e chassi": { pequeno:150, medio:200, grande:300 },
"Higienização de bancos de couro": { pequeno:240, medio:290, grande:370 },
"Limpeza e hidratação de couro": { pequeno:150, medio:160, grande:170 },
"Cristalização de vidros": { pequeno:40, medio:65, grande:85 },
"Descontaminação de vidros": { pequeno:140, medio:170, grande:240 },
"Descontaminação de pintura": { pequeno:110, medio:140, grande:190 },
"Enceramento especial": { pequeno:50, medio:50, grande:50 }
};

const tempos = {
"Cristalização de pintura":"18h",
"Polimento técnico":"3 dias",
"Vitrificação de pintura":"1 dia",
"Higienização":"8h",
"Vitrificação de faróis":"3h",
"Polimento comercial":"12h",
"Lavagem técnica":"8h",
"Lavagem simples":"4h",
"Lavagem banco de tecido":"8h",
"Ducha simples":"40min",
"Lavagem com cera":"4h",
"Aspiração":"1h",
"Lavagem motor e chassi":"6h",
"Higienização de bancos de couro":"7h",
"Limpeza e hidratação de couro":"4h",
"Cristalização de vidros":"1h",
"Descontaminação de vidros":"4h",
"Descontaminação de pintura":"5h",
"Enceramento especial":"1h"
};

function getDados(){
return {
nome: document.getElementById("nome").value,
marca: document.getElementById("marca").value,
carro: document.getElementById("carro").value,
placa: document.getElementById("placa").value,
ano: document.getElementById("ano").value,
cor: document.getElementById("cor").value,
porte: document.getElementById("porte").value,
itens: document.querySelectorAll("input[type=checkbox]:checked")
};
}

function resumo(){

let d = getDados();
let total = 0;
let html = "";

if(!d.porte){
alert("Selecione o porte!");
return;
}

d.itens.forEach(i=>{
let nome = i.value;
let preco = precos[nome][d.porte];
total += preco;

html += `✔ ${nome} - R$ ${preco} - ${tempos[nome]}<br>`;
});

document.getElementById("resumo").innerHTML =
html + `<br><b>Total: R$ ${total}</b>`;
}

function agendar(){

let d = getDados();

if(!d.nome || !d.carro || !d.porte || d.itens.length===0){
alert("Preencha todos os campos!");
return;
}

let total = 0;
let lista = "";

d.itens.forEach(i=>{
let nome = i.value;
let preco = precos[nome][d.porte];
total += preco;
lista += `• ${nome}\n`;
});

let msg =
`🚗 AGENDAMENTO IRJ ESTÉTICA AUTO

👤 Nome: ${d.nome}
🏷 Marca: ${d.marca}
🚘 Modelo: ${d.carro}
📌 Placa: ${d.placa}
📅 Ano: ${d.ano || "não informado"}
🎨 Cor: ${d.cor}

📦 Porte: ${d.porte}

🧼 Serviços:
${lista}

💰 TOTAL: R$ ${total}`;

let url = "https://api.whatsapp.com/send?phone=5537984185396&text=" + encodeURIComponent(msg);

window.open(url, "_blank");
}

function baixarPDF(){

let d = getDados();
let total = 0;
let texto = "";

d.itens.forEach(i=>{
let nome = i.value;
let preco = precos[nome][d.porte];
total += preco;
texto += `${nome} - R$ ${preco}\n`;
});

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

doc.text("IRJ ESTÉTICA AUTO", 10, 10);
doc.text("Nome: " + d.nome, 10, 20);
doc.text("Marca: " + d.marca, 10, 30);
doc.text("Carro: " + d.carro, 10, 40);
doc.text("Placa: " + d.placa, 10, 50);
doc.text("Ano: " + (d.ano || "N/A"), 10, 60);
doc.text("Cor: " + d.cor, 10, 70);

doc.text("Serviços:", 10, 90);
doc.text(texto, 10, 100);

doc.text("TOTAL: R$ " + total, 10, 150);

doc.save("agendamento_IRJ.pdf");
}

</script>

</body>
</html>
